name: Build Blog Posts

on:
  push:
    paths:
      - 'posts/**.md'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install marked

      - name: Build posts
        run: node .github/scripts/build-posts.js

      - name: Commit built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/*.html posts.json
          git diff --cached --quiet || git commit -m "build: generate posts from markdown"
          git push
