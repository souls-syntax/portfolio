name: Update Now Playing

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  nowplaying:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Now Playing from Last.fm
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: |
          RESPONSE=$(curl -s "https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=souls_syntax&api_key=${LASTFM_API_KEY}&format=json&limit=1")

          NOWPLAYING=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          tracks = data.get('recenttracks', {}).get('track', [])
          if not tracks:
              print(json.dumps({'artist': '---', 'track': '---', 'nowplaying': False}))
              sys.exit(0)
          track = tracks[0]
          artist = track.get('artist', {}).get('#text', '---')
          name = track.get('name', '---')
          nowplaying = track.get('@attr', {}).get('nowplaying') == 'true'
          print(json.dumps({'artist': artist, 'track': name, 'nowplaying': nowplaying}))
          ")

          echo "$NOWPLAYING" > nowplaying.json
          echo "nowplaying.json updated: $NOWPLAYING"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nowplaying.json
          git diff --cached --quiet || git commit -m "chore: update now playing"
          git push
