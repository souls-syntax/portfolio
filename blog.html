<script>
  function filterPosts(tag) {
    var rows = document.querySelectorAll('.post-row');
    for (var i = 0; i < rows.length; i++) {
      if (tag === 'all' || rows[i].getAttribute('data-tags').indexOf(tag) !== -1) {
        rows[i].style.display = '';
      } else {
        rows[i].style.display = 'none';
      }
    }
  }

  fetch('nowplaying.json')
    .then(function(r){ return r.json(); })
    .then(function(d){
      document.getElementById('np-artist').textContent = d.artist || '---';
      document.getElementById('np-track').textContent = d.track || '---';
    })
    .catch(function(){});

  fetch('posts.json')
  .then(function(r){ return r.json(); })
  .then(function(posts){
    var list = document.getElementById('post-list');
    list.innerHTML = '';
    for (var i = 0; i < posts.length; i++) {
      var p = posts[i];
      var tagStr = p.tags.map(function(t){ return '['+t+']'; }).join(' ');
      var row = document.createElement('tr');
      row.className = 'post-row';
      row.setAttribute('data-tags', p.tags.join(' '));
      row.innerHTML =
        '<td><small>' + p.date + '</small></td>' +
        '<td><a href="' + p.url + '">' + p.title + '</a></td>' +
        '<td><small>' + tagStr + '</small></td>';
      list.appendChild(row);
    }
  })
  .catch(function(){});
</script>
